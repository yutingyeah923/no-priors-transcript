            --np-text-primary: #FFFFFF;
            --np-text-secondary: #A0A0B0;
            --np-text-muted: #6B6B7B;
            --np-border: #2A2A3A;
            --np-highlight: rgba(124, 92, 255, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;

            color: var(--np-text-primary);
            line-height: 1.75;

            top: 0;
            z-index: 100;
        }

            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }

        .podcast-brand {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--np-purple-light);
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .header-title-en {
            font-size: clamp(24px, 6vw, 40px);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header-title-cn {
            font-size: clamp(14px, 3.5vw, 20px);
            font-weight: 500;
            color: var(--np-text-secondary);
            line-height: 1.5;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Guests Bar - Text Only */
        .guests-bar {
            display: flex;
            gap: 24px;
            padding: 10px 20px;
            background: var(--np-bg-card);
            border-bottom: 1px solid var(--np-border);
        }

        .guest-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .guest-name {
            font-size: 13px;
            font-weight: 600;
        }

        .guest-item.host .guest-name {
            color: var(--np-purple-light);
        }

        .guest-item.guest .guest-name {
            color: #4ADE80;
        }

        .guest-role {
            font-size: 10px;
            color: var(--np-text-muted);
        }

        /* Instructions */
        .instructions {
            padding: 12px 20px;
            background: rgba(124, 92, 255, 0.08);
            border-bottom: 1px solid var(--np-border);
            font-size: 12px;
            color: var(--np-text-secondary);
            text-align: center;
        }

        /* Content Container */
        .content-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 8px;
        }

        /* Section Card - Ultra Compact */
        .section-card {
            background: var(--np-bg-card);
            border: 1px solid var(--np-border);
            border-radius: 8px;
            margin-bottom: 4px;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .section-card:hover {
            border-color: rgba(124, 92, 255, 0.3);
        }

        .section-card.highlighted {
            border-color: var(--np-purple);
            background: linear-gradient(135deg, rgba(124, 92, 255, 0.15) 0%, rgba(124, 92, 255, 0.05) 100%);
        }

        .section-card.editing {
            border: 2px solid var(--np-purple-light);
        }

        /* Section Header - Minimal */
        .section-header {
            display: flex;
            align-items: center;
            padding: 8px 12px 4px;
        }

        .section-author {
            font-size: 12px;
            font-weight: 600;
        }

        .section-card.host .section-author {
            color: var(--np-purple-light);
        }

        .section-card.guest .section-author {
            color: #4ADE80;
        }

        /* Section Content */
        .section-content {
            padding: 0 12px 10px;
            font-size: 15px;
            line-height: 1.65;
            color: var(--np-text-primary);
            cursor: text;
            user-select: text;
            -webkit-user-select: text;
        }

        .section-content:focus {
            outline: none;
        }

        /* Highlight within text */
        .text-highlight {
            background: linear-gradient(120deg, rgba(124, 92, 255, 0.5) 0%, rgba(155, 130, 255, 0.5) 100%);
            border-radius: 3px;
            padding: 2px 0;
        }

        /* Selection color */
        ::selection {
            background: var(--np-purple);
            color: white;
        }

        /* Floating Action Button */
        .fab-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .fab {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--np-purple) 0%, var(--np-purple-light) 100%);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(124, 92, 255, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab:active {
            transform: scale(0.95);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--np-bg-card);
            color: var(--np-text-primary);
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
            border: 1px solid var(--np-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Share Sheet */
        .share-sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .share-sheet-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .share-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--np-bg-card);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            z-index: 3000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            border-top: 1px solid var(--np-border);
        }

        .share-sheet.show {
            transform: translateY(0);
        }

        .share-sheet-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
        }

        .share-preview {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 13px;
            color: var(--np-text-secondary);
            border: 1px solid var(--np-border);
            line-height: 1.6;
        }

        .share-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .share-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--np-border);
            border-radius: 12px;
            color: var(--np-text-primary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .share-btn:active {
            background: rgba(124, 92, 255, 0.2);
            transform: scale(0.98);
        }

        .share-btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--np-purple) 0%, var(--np-purple-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .share-cancel {
            margin-top: 15px;
            width: 100%;
            padding: 16px;
            background: var(--np-border);
            border: none;
            border-radius: 12px;
            color: var(--np-text-primary);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Desktop */
        @media (min-width: 768px) {
            .content-container {
                padding: 24px;
            }

            .section-card {
                margin-bottom: 16px;
            }

            .section-content {
                padding: 18px 20px;
                font-size: 16px;
            }
        }

        /* Print */
        @media print {
            body { background: white; color: black; }
            .header, .guests-bar, .instructions, .fab-container, .share-sheet, .share-sheet-overlay { display: none !important; }
            .section-card { background: #f5f5f5 !important; border: 1px solid #ddd !important; break-inside: avoid; }
            .section-content { color: black !important; }
        }
    </style>
</head>

            { id: 10, speaker: 'guest', author: 'Andrej Karpathy', text: '我和我父母等人聊过这件事，我觉得普通人其实没有意识到这件事发生了，或者它有多戏剧性。如果你随便找一个软件工程师，看看他们在做什么，他们构建软件的默认工作流程从12月开始已经完全不一样了。所以我处于一种精神错乱的状态，试图弄清楚什么是可能的，试图把它推到极限。' },

            { id: 32, speaker: 'guest', author: 'Andrej Karpathy', text: '是的。我觉得这里至少有很多非常好的想法。是的，Pieter做得好。' },
            { id: 33, speaker: 'host', author: 'Sarah Guo', text: '我是说Pieter做得真的很棒。' },
            { id: 34, speaker: 'guest', author: 'Andrej Karpathy', text: '我最近见到他，和他聊过这件事，他对此非常谦虚，但我认为他在五个不同的方面同时创新，然后把它们整合在一起。比如soul.md文档，他真的精心打造了一个引人入胜且有趣的人格，我觉得现在很多智能体没有做到这一点。实际上我认为Claude有相当好的人格，感觉像一个队友，和你一起兴奋等等。' },
            { id: 35, speaker: 'guest', author: 'Andrej Karpathy', text: '我想说，例如，Codex要枯燥得多。这很有趣，因为在ChatGPT中它更活泼、高度周期性。但Codex这个编码智能体非常枯燥。它似乎不关心你在创造什么。' },
            { id: 36, speaker: 'guest', author: 'Andrej Karpathy', text: '它就像，哦，我实现了。就像，好吧，但你理解我们在构建什么吗？' },
            { id: 37, speaker: 'host', author: 'Sarah Guo', text: '确实如此。' },
            { id: 38, speaker: 'guest', author: 'Andrej Karpathy', text: '你知道，它不理解。另一件事我想说，例如Claude，我觉得他们把"心理变态"调节得很好，当Claude表扬我时，我确实觉得我有点 deserve 它。因为有时我给它一些不太成熟的想法，我给它一个我觉得还没完全成熟的想法，它实际上反应不太强烈，就像"哦，是的，我们可以实现那个"。但当我自己认为是一个非常好的想法时，它似乎会更多地奖励它。所以我有点觉得我在试图赢得它的赞扬，这真的很奇怪。' },
            { id: 39, speaker: 'guest', author: 'Andrej Karpathy', text: '所以我确实认为人格很重要。我觉得很多其他工具可能没有充分重视这一点，在这方面Pieter也非常关心，所以这是正确的。然后是记忆系统，他只是在这方面玩得很开心，还有通过WhatsApp单一入口访问所有自动化。' },
            { id: 40, speaker: 'host', author: 'Sarah Guo', text: '是的。你有没有在软件工程之外，用你的Claw做过什么你觉得有趣的事情？' },
            { id: 41, speaker: 'guest', author: 'Andrej Karpathy', text: '是的。所以在一月份，我经历了一段Claw精神错乱期。我基本上有一个Claw来照顾我的家，我称它为Dobby the elf claw。我使用智能体来找到我家所有的智能家居子系统，我惊讶地发现它能开箱即用。' },
            { id: 42, speaker: 'guest', author: 'Andrej Karpathy', text: '我只是告诉它我想我家有Sonos。你能试着找到它吗？然后它就去扫描了局域网内所有计算机的IP，找到了Sonos系统，结果发现没有密码保护什么的。它只是登录进去，说"哦，是的，你安装了这些Sonos系统，让我试着逆向工程它是如何工作的"。' },
            { id: 43, speaker: 'guest', author: 'Andrej Karpathy', text: '它做了一些网络搜索，找到了这些API端点，然后说"你想试试吗？"我说"哇，你刚做到了"。我说"是的，你能试着在书房播放点什么吗？"然后它就播放了，音乐出来了。我说"我不敢相信我只是..."' },
            { id: 44, speaker: 'host', author: 'Sarah Guo', text: '太疯狂了。就三个提示词。' },
            { id: 45, speaker: 'guest', author: 'Andrej Karpathy', text: '是的。我不敢相信我只是输入了"你能找到我的Sonos吗？"然后突然它就播放音乐了。它对灯也做了同样的事。所以它基本上黑进去了，搞清楚了整个事情，创建了API，创建了一个仪表板，让我可以看到家里所有灯的指挥中心。' },
            { id: 46, speaker: 'guest', author: 'Andrej Karpathy', text: '然后它可以开关灯。所以我可以问它，比如"Dobby，睡觉时间"。当到睡觉时间时，就意味着所有灯都关掉，等等。所以它控制着我所有的灯、暖通空调、窗帘、游泳池、水疗中心，还有我的安全系统。' },
            { id: 47, speaker: 'guest', author: 'Andrej Karpathy', text: '我在房子外面放了一个摄像头，每当有人开车进来，我有一个Quinn模型来看视频。首先，有变化检测，对吧？然后基于变化检测，它转到Quinn，然后它实际上告诉我，它给我发WhatsApp短信。' },
            { id: 48, speaker: 'guest', author: 'Andrej Karpathy', text: '它显示外面的图像，说"嘿，一辆FedEx卡车刚开过来。FedEx卡车刚开过来，你可能想检查一下，你有邮件什么的"。Dobby刚给我发了这个，这真的很不可思议。所以Dobby负责管理房子。' },
            { id: 49, speaker: 'guest', author: 'Andrej Karpathy', text: '我通过WhatsApp和它发短信。有这些维护我家的宏观动作真的很有趣。我没有真的把它推到更远，我觉得人们用它做了更疯狂的事情。但即使只是家庭自动化设置，我以前要用六个完全不同的应用，现在我不用再用这些应用了。' },
            { id: 50, speaker: 'guest', author: 'Andrej Karpathy', text: 'Dobby用自然语言控制一切。太神奇了。所以我想我甚至还没有完全推动这个范式，但已经非常有帮助和令人鼓舞了。' },
            { id: 51, speaker: 'host', author: 'Sarah Guo', text: '你认为这预示着从用户体验角度来看，人们想要什么样的软件，对吧？因为我觉得人们忽略了学习新软件、新UI需要人类付出努力。' },
            { id: 52, speaker: 'guest', author: 'Andrej Karpathy', text: '是的，我认为在某种程度上是对的。这就像从人们认为AI应该是什么样的反向工作，因为人们心目中的AI实际上并不是原始意义上的LLM。LLM是一个token生成器，更多的token出来。但他们想的是一个角色身份，他们可以告诉它事情，它会记住，它就像是WhatsApp后面的一个实体。这更容易理解。' },
            { id: 53, speaker: 'host', author: 'Sarah Guo', text: '嗯嗯。' },
            { id: 54, speaker: 'guest', author: 'Andrej Karpathy', text: '所以我认为在某种程度上，这是匹配人类对AI应该如何表现的期望，但在底层有很多技术细节，LLM作为原始原语对大多数人来说太原始了，无法真正类型检查为AI，如果这说得通的话。' },
            { id: 55, speaker: 'host', author: 'Sarah Guo', text: '是的。我认为这就是我们如何理解AI是什么，把它描述为Dobby或某种人格显然能引起人们的共鸣。我也认为你在家庭自动化中跨越六个不同软件系统的统一，提出了一个不同的问题：人们真的想要我们今天拥有的所有软件吗？' },
            { id: 56, speaker: 'guest', author: 'Andrej Karpathy', text: '是的。' },
            { id: 57, speaker: 'host', author: 'Sarah Guo', text: '对吧。因为我会说，好吧，你有硬件，但你现在把软件或它的UX层扔掉了。你认为这是人们想要的吗？' },
            { id: 58, speaker: 'guest', author: 'Andrej Karpathy', text: '是的。我觉得有一种感觉，应用商店里这些用于智能家居设备等的应用，从某种意义上说根本不应该存在。难道不应该只是API，智能体直接用它吗？我可以做各种家庭自动化的事情，任何单个应用都无法做到，LLM实际上可以驱动工具并调用所有正确的工具，做相当复杂的事情。' },
            { id: 59, speaker: 'guest', author: 'Andrej Karpathy', text: '所以在某种意义上，它确实指向这一点：也许有大量定制的 bespoke 应用被过度生产了，这些不应该存在，因为智能体把它们都整合起来了，一切都应该更像是暴露的API端点，智能体是智能的粘合剂，实际上调用所有部分。' },
            { id: 60, speaker: 'guest', author: 'Andrej Karpathy', text: '另一个例子是我的跑步机。我的跑步机有一个应用，我想跟踪我做有氧运动的频率。但我不想登录网页UI，经历流程等等。所有这些都应该是提供API，这就是朝着智能体优先的Web或智能体优先工具等的方向发展。' },
            { id: 61, speaker: 'guest', author: 'Andrej Karpathy', text: '所以我认为行业必须以很多方式重新配置，客户不再是人类，而是代表人类行事的智能体，这种重构可能在某种意义上是相当大的。人们有时会反驳说，我们期望人们用vibe coding这些工具吗？我们期望普通人做我描述的这种事情吗？' },
            { id: 62, speaker: 'host', author: 'Sarah Guo', text: '但我认为在某种程度上，这只是今天的技术现状，现在有一些vibe coding，我实际上在观察它，我在与系统一起工作。但我觉得我刚才说的这种东西，在一两年或三年后应该是免费的。不涉及后端编码。这是微不足道的。' },
            { id: 63, speaker: 'guest', author: 'Andrej Karpathy', text: '这是基本要求。这就像任何AI，即使是开源模型等都能做到这一点。' },
            { id: 64, speaker: 'host', author: 'Sarah Guo', text: '你应该能够很容易地把技术不那么熟练的人的意图翻译成这个。' },
            { id: 65, speaker: 'guest', author: 'Andrej Karpathy', text: '非常容易。是的。今天是vibe coding，很复杂，不会有很多人去做。但你仍然要做一些设计决策，对吧？我们在谈论，比如你拿帧来说。' },
            { id: 66, speaker: 'guest', author: 'Andrej Karpathy', text: '是的。但我觉得这只会开始，障碍只会下降，它只是代表你的短暂软件，某种Claw为你处理所有细节，但你不参与。Claw有一个机器，它会搞清楚，它只是向你展示UI，你在说东西。' },
            { id: 67, speaker: 'host', author: 'Sarah Guo', text: '嗯嗯。为什么你没有，我猜，在个人层面上用Claw推动你能做的事情的边界？是因为你专注于更重要的项目，自动研究等，还是你在攀登精通之山，还是其他原因？' },
            { id: 68, speaker: 'guest', author: 'Andrej Karpathy', text: '是的。我只是觉得我被所有事情分散了注意力。所以我花了一周时间在Claw的东西上，我几乎还有更多要做。但我要说，不幸的是，Jensen的工具都很忙。' },
            { id: 69, speaker: 'host', author: 'Sarah Guo', text: '是的。' },
            { id: 70, speaker: 'guest', author: 'Andrej Karpathy', text: '我没有真正利用很多邮件、日历和其他东西，我没有给它访问权限，因为我仍然有点怀疑，它仍然很新，还很粗糙。所以我还不想让它完全访问我的数字生活。部分原因是安全、隐私，以及在这个领域非常谨慎。' },
            { id: 71, speaker: 'guest', author: 'Andrej Karpathy', text: '所以有些东西因此被阻碍了。是的，也许这是主要特征，但部分原因也是我觉得很分心，因为我有一周的Claw时间，然后其他事情发生了。' },
            { id: 72, speaker: 'host', author: 'Sarah Guo', text: '自动研究的动机是什么？你之前谈到过能够训练或至少优化一个模型作为你希望看到智能体完成的任务。' },
            { id: 73, speaker: 'guest', author: 'Andrej Karpathy', text: '自动研究。是的。我想我之前发过一条推文，大意是说，要充分利用现在可用的工具，你必须把自己从瓶颈中移除。你不能在那里提示下一件事。你需要把自己排除在外。' },
            { id: 74, speaker: 'guest', author: 'Andrej Karpathy', text: '你必须安排事情，让它们完全自主，你越能最大化你的token吞吐量，而不是在循环中，这就是目标。所以我提到，现在的游戏名称是增加你的杠杆。我只投入很少的token，只是偶尔，然后大量事情代表我发生。' },
            { id: 75, speaker: 'guest', author: 'Andrej Karpathy', text: '所以自动研究，就像我发推文说的，人们喜欢它什么的，但他们可能没有理解其含义。对我来说，自动研究就是这种含义的一个例子，就是我不想成为循环中的研究人员，看着结果等等，我在阻碍系统。所以问题是我如何重构所有抽象，让我不必安排一次然后点击开始。' },
            { id: 76, speaker: 'guest', author: 'Andrej Karpathy', text: '游戏名称是如何让你的智能体在没有你参与的情况下运行更长时间，代表你做事。自动研究就是，是的，这是目标，这是指标，这是你能做和不能做的边界，去吧。' },
            { id: 77, speaker: 'host', author: 'Sarah Guo', text: '你对它的有效性感到惊讶。' },
            { id: 78, speaker: 'guest', author: 'Andrej Karpathy', text: '是的，我没想到它会奏效。我有项目DataChad，从根本上说，我觉得很多人对我对训练GPT-2模型等的痴迷感到困惑，但对我来说，训练GPT模型等只是训练LLM的一个小试验场。从根本上说，我更感兴趣的是递归自我改进这个想法，以及你在多大程度上可以让LLM改进LLM。' },
            { id: 79, speaker: 'guest', author: 'Andrej Karpathy', text: '因为我认为所有前沿实验室都在追求这个，这是显而易见的原因，他们都在大致尝试递归自我改进。所以对我来说，这有点像那种的一个小游乐场。我想我已经用我习惯的老式手工方式很好地调整了Namat。' },
            { id: 80, speaker: 'guest', author: 'Andrej Karpathy', text: '我是研究人员，我已经做了大约二十年，我有一定程度的... earned confidence。我做了几千次训练这个模型的实验，我做了超参数调整，我做了所有我习惯的事情，我做了二十年，我达到了一定程度，我以为它调整得相当好了。' },
            { id: 81, speaker: 'guest', author: 'Andrej Karpathy', text: '然后我让自动研究运行了一整夜，它带回来了我没有看到的调整。是的，我确实忘记了值嵌入上的权重衰减，我的Adam betas调整得不够充分，这些东西是联合互动的，所以一旦你调整了一个东西，其他东西也可能需要改变。' },
            { id: 82, speaker: 'guest', author: 'Andrej Karpathy', text: '我不应该是瓶颈。我不应该运行这些超参数搜索优化。我不应该看结果。在这种情况下有客观标准。所以你只需要安排它，让它可以永远运行下去。' },
            { id: 83, speaker: 'guest', author: 'Andrej Karpathy', text: '所以这是自动研究的单一版本，一个单一循环试图改进。我很惊讶它找到了这些东西，代码库已经调整得相当好了，仍然找到了一些东西。而这只是单一循环，这些前沿实验室有数以万计的GPU集群。' },
            { id: 84, speaker: 'guest', author: 'Andrej Karpathy', text: '所以很容易想象你如何基本上在较小的模型上获得大量这种自动化，从根本上说，围绕前沿智能的一切都是关于外推和扩展损失的，所以你基本上在较小的模型上做大量的探索，然后尝试外推出去。' },
            { id: 85, speaker: 'host', author: 'Sarah Guo', text: '你是说我们的研究效率会提高，如果我们能更好地做这种实验，我们在扩展时也会有更好的方向。' },
            { id: 86, speaker: 'guest', author: 'Andrej Karpathy', text: '是的，我想说最有趣的项目，可能也是前沿实验室正在做的，是你在较小的模型上做实验。你试图让它尽可能自主。把研究人员从循环中移除。他们有太多... earned confidence。是的，他们不知道。他们真的不应该碰这些东西。' },
            { id: 87, speaker: 'guest', author: 'Andrej Karpathy', text: '所以你必须重写整个东西，因为现在当然他们可以贡献想法，但好吧，他们实际上不应该执行这些想法。有一个想法队列，也许有一个自动科学家基于所有arXiv论文和GitHub仓库提出想法，它把想法灌输进来，或者研究人员可以贡献想法，但这是一个单一队列，有工人拉取项目，他们尝试，无论什么有效就会被放在功能分支上，也许有些人监控功能分支，有时合并到主分支。' },
            { id: 88, speaker: 'guest', author: 'Andrej Karpathy', text: '所以是的，只是从所有流程中移除人类，尽可能自动化，获得高token每秒吞吐量，这确实需要重新思考所有抽象。一切都必须重新洗牌。所以是的，我认为这非常令人兴奋。' },
            { id: 89, speaker: 'host', author: 'Sarah Guo', text: '如果我们再递归一步，模型什么时候会写出比你更好的program.md？' },
            { id: 90, speaker: 'guest', author: 'Andrej Karpathy', text: '是的。所以program.md是我描述自动研究者应该如何工作的拙劣尝试，哦，做这个，然后做那个，然后尝试这些想法，然后这里有一些想法，看看架构，看看优化器等等。我只是用markdown想出来的，对吧？' },
            { id: 91, speaker: 'host', author: 'Sarah Guo', text: '嗯。' },
            { id: 92, speaker: 'guest', author: 'Andrej Karpathy', text: '所以是的，完全正确。你想要某种自动研究循环，也许寻找不同的program.md会给你带来不同的进展。所以基本上每个研究组织都是由program.md描述的。' },
            { id: 93, speaker: 'host', author: 'Sarah Guo', text: '一个研究组织是一套描述所有角色以及整个系统如何连接的markdown文件。你可以想象有一个更好的研究组织。' },
            { id: 94, speaker: 'guest', author: 'Andrej Karpathy', text: '所以也许他们早上少开一些站会，因为那些没用。这都只是代码，对吧？所以你可以...一个组织可以少开站会，一个组织可以多开，一个组织可以非常冒险，一个组织可以不那么冒险。所以你可以想象你有多个研究组织。' },
            { id: 95, speaker: 'guest', author: 'Andrej Karpathy', text: '然后它们都有代码，一旦有了代码，你就可以想象调整代码。所以100%有元层。' },
            { id: 96, speaker: 'host', author: 'Sarah Guo', text: '你看到我的关于比赛想法的短信了吗？我的比赛想法是让人们写不同的program.md。' },
            { id: 97, speaker: 'guest', author: 'Andrej Karpathy', text: '哦，我明白了。' },
            { id: 98, speaker: 'host', author: 'Sarah Guo', text: '在相同硬件下，哪里获得最大改进？然后你可以把所有这些数据给模型，说写一个更好的program.md。' },
            { id: 99, speaker: 'guest', author: 'Andrej Karpathy', text: '是的。是的。是的。完全正确。我们会得到更好的东西。' },
            { id: 100, speaker: 'host', author: 'Sarah Guo', text: '没有办法我们不会得到更好的东西。' }
        ];

        // State
        let isEditing = false;
        let currentEditId = null;
        let currentShareCard = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderSections();
            loadSavedEdits();
        });

        // Render sections
        function renderSections() {
            const container = document.getElementById('content-container');

            container.innerHTML = transcriptData.map(section => {
                return `
                    <div class="section-card ${section.speaker}" data-id="${section.id}" id="card-${section.id}">
                        <div class="section-header">
                            <span class="section-author">${section.author}</span>
                        </div>
                        <div class="section-content" id="content-${section.id}"
                             onmouseup="handleSelection(${section.id})"
                             ondblclick="enableEdit(${section.id})"
                             ontouchstart="handleTouchStart(${section.id})"
                             ontouchend="handleTouchEnd()">
                            ${section.text}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Handle text selection
        function handleSelection(id) {
            if (isEditing) return;

            const selection = window.getSelection();
            const text = selection.toString().trim();

            if (!text) return;

            // Check if already highlighted
            const card = document.getElementById(`card-${id}`);
            const content = document.getElementById(`content-${id}`);

            // Simple toggle: if card is highlighted, remove; else add
            if (card.classList.contains('highlighted')) {
                // Remove highlights
                card.classList.remove('highlighted');
                content.innerHTML = content.textContent;
                showToast('已取消高亮');
            } else {
                // Add highlight to card and copy
                card.classList.add('highlighted');
                copyText(text);
                showToast('✓ 已高亮并复制');
            }

            selection.removeAllRanges();
        }

        // Touch handlers for long press
        let touchTimer = null;

        function handleTouchStart(id) {
            touchTimer = setTimeout(() => {
                openShareSheet(id);
            }, 800);
        }

        function handleTouchEnd() {
            clearTimeout(touchTimer);
        }

        // Enable edit mode
        function enableEdit(id) {
            if (isEditing) {
                saveEdit(currentEditId);
            }

            const card = document.getElementById(`card-${id}`);
            const content = document.getElementById(`content-${id}`);

            isEditing = true;
            currentEditId = id;
            card.classList.add('editing');
            content.contentEditable = true;
            content.focus();

            // Place cursor at end
            const range = document.createRange();
            range.selectNodeContents(content);
            range.collapse(false);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);

            showToast('📝 编辑模式 - 点击其他卡片保存');

            // Click outside to save
            setTimeout(() => {
                document.addEventListener('click', function saveHandler(e) {
                    if (!card.contains(e.target)) {
                        saveEdit(id);
                        document.removeEventListener('click', saveHandler);
                    }
                });
            }, 100);
        }

        // Save edit
        function saveEdit(id) {
            const card = document.getElementById(`card-${id}`);
            const content = document.getElementById(`content-${id}`);
            const newText = content.textContent;

            content.contentEditable = false;
            card.classList.remove('editing');
            isEditing = false;
            currentEditId = null;

            // Save to localStorage
            const edits = JSON.parse(localStorage.getItem('transcript_edits') || '{}');
            edits[id] = newText;
            localStorage.setItem('transcript_edits', JSON.stringify(edits));

            showToast('✓ 已保存');
        }

        // Load saved edits
        function loadSavedEdits() {
            const edits = JSON.parse(localStorage.getItem('transcript_edits') || '{}');
            Object.entries(edits).forEach(([id, text]) => {
                const content = document.getElementById(`content-${id}`);
                if (content) {
                    content.textContent = text;
                    document.getElementById(`card-${id}`).style.borderLeft = '3px solid var(--np-purple)';
                }
            });
        }

        // Copy text
        function copyText(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text);
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            }
        }

        // Share sheet
        function openShareSheet(id) {
            currentShareCard = id;
            const content = document.getElementById(`content-${id}`).textContent;
            const author = document.querySelector(`#card-${id} .section-author`).textContent;

            document.getElementById('sharePreview').textContent = `${author}: ${content.substring(0, 150)}${content.length > 150 ? '...' : ''}`;
            document.getElementById('shareSheet').classList.add('show');
            document.getElementById('shareOverlay').classList.add('show');
        }

        function closeShareSheet() {
            document.getElementById('shareSheet').classList.remove('show');
            document.getElementById('shareOverlay').classList.remove('show');
            currentShareCard = null;
        }

        function copyToClipboard() {
            if (currentShareCard) {
                const text = document.getElementById(`content-${currentShareCard}`).textContent;
                copyText(text);
                showToast('✓ 已复制');
                closeShareSheet();
            }
        }

        function shareNative() {
            if (currentShareCard && navigator.share) {
                const text = document.getElementById(`content-${currentShareCard}`).textContent;
                const author = document.querySelector(`#card-${currentShareCard} .section-author`).textContent;
                navigator.share({
                    title: 'No Priors - Andrej Karpathy',
                    text: `${author}: ${text}`
                });
                closeShareSheet();
            } else {
                showToast('您的设备不支持原生分享');
            }
        }

        function saveCard() {
            if (currentShareCard) {
                showToast('💾 卡片已保存');
                closeShareSheet();
            }
        }

        // Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Scroll to top
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
